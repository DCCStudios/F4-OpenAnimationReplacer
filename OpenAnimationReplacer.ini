[General]
bEnabled=1
bEnableUI=1
bAsyncParsing=1
bDisablePreloading=0
bFilterOutDuplicateAnimations=1
bShowWelcomeBanner=1
; Direct path matching (default 1): match replacements against the clip's
; resolved on-disk animation path (e.g. Weapons\SCAR\WPNReload.hkx); leaf-name
; matching is only used as a fallback for clips whose real path cannot be
; resolved. Set to 0 to restore the legacy leaf-matching behavior everywhere.
bDirectPathMatching=1

[UI]
; DIK scan code for the overlay toggle. Default 60 (0x3C) = F2.
; Change in-game via Settings → Activation Key, or set here.
iToggleKey=60
; When 1, Shift must also be held with iToggleKey. Default 0 (F2 alone).
bRequireShift=0

[AnimationLog]
bLogActivate=1
bLogReplace=1
bLogLoop=1
bLogEcho=0
bLogToFile=0
iMaxLogEntries=100

[Limits]
iAnimationLimit=16384
iHavokHeapMultiplier=2

[Debug]
bVerboseLogging=0
